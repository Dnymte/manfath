name: Manfath
options:
  bundleIdPrefix: com.manfath
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

knownRegions:
  - en
  - ar
  - Base

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES

targets:
  Manfath:
    type: application
    platform: macOS
    sources:
      - path: Manfath
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Manfath/Resources
    info:
      path: Manfath/App/Info.plist
      properties:
        LSUIElement: YES
        CFBundleName: Manfath
        CFBundleDisplayName: Manfath
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2026 Manfath. All rights reserved."
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - ar
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
    entitlements:
      path: Manfath/App/Manfath.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.manfath.app
        PRODUCT_NAME: Manfath
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Manfath"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts

  ManfathTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ManfathTests
    dependencies:
      - target: Manfath
