<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16161b"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8ff5c" stop-opacity=".8"/>
      <stop offset=".5" stop-color="#b8ff5c" stop-opacity=".35"/>
      <stop offset="1" stop-color="#5ce4ff" stop-opacity=".8"/>
    </linearGradient>
    <radialGradient id="glow1" cx=".1" cy=".5" r=".45">
      <stop offset="0" stop-color="#b8ff5c" stop-opacity=".18"/>
      <stop offset="1" stop-color="#b8ff5c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx=".9" cy=".5" r=".45">
      <stop offset="0" stop-color="#5ce4ff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#5ce4ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="transparent"/>
      <circle cx="1" cy="1" r=".35" fill="#2a262c" opacity=".5"/>
      <circle cx="2.2" cy="2.4" r=".25" fill="#3a353c" opacity=".3"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- threads sweeping across, behind everything else -->
  <path d="M 110 470 C 380 320, 820 600, 1090 470" stroke="url(#thread)" stroke-width="2.2" fill="none" opacity=".55"/>
  <path d="M 110 510 C 380 380, 820 620, 1090 510" stroke="url(#thread)" stroke-width="1.4" fill="none" opacity=".3"/>
  <path d="M 110 430 C 380 270, 820 580, 1090 430" stroke="url(#thread)" stroke-width="1" fill="none" opacity=".18"/>

  <!-- packets hint along the main thread -->
  <circle cx="430" cy="395" r="3.5" fill="#5ce4ff" opacity=".9"/>
  <circle cx="650" cy="430" r="3.5" fill="#5ce4ff" opacity=".7"/>
  <circle cx="870" cy="475" r="3.5" fill="#5ce4ff" opacity=".5"/>

  <!-- origin port chip (left) -->
  <g transform="translate(110, 470)">
    <rect x="-32" y="-22" width="64" height="44" rx="4" fill="#e8e2d4"/>
    <rect x="-24" y="-14" width="48" height="28" rx="2" fill="#0a0a0c"/>
    <g fill="#d9b26a">
      <rect x="-20" y="-10" width="1.6" height="20"/>
      <rect x="-14" y="-10" width="1.6" height="20"/>
      <rect x="-8" y="-10" width="1.6" height="20"/>
      <rect x="-2" y="-10" width="1.6" height="20"/>
      <rect x="4" y="-10" width="1.6" height="20"/>
      <rect x="10" y="-10" width="1.6" height="20"/>
      <rect x="16" y="-10" width="1.6" height="20"/>
    </g>
    <circle cx="-26" cy="-17" r="2" fill="#b8ff5c"/>
    <text x="0" y="42" font-family="ui-monospace, JetBrains Mono, monospace" font-size="13" fill="#5a564e" text-anchor="middle">:3000 localhost</text>
  </g>

  <!-- public URL globe (right) -->
  <g transform="translate(1090, 470)">
    <circle r="32" fill="none" stroke="#5ce4ff" stroke-width="1.4" opacity=".85"/>
    <circle r="42" fill="none" stroke="#5ce4ff" stroke-width=".8" opacity=".4"/>
    <circle r="20" fill="rgba(92,228,255,.12)" stroke="#5ce4ff" stroke-width="1"/>
    <path d="M -16 0 L 16 0 M 0 -16 L 0 16" stroke="#5ce4ff" stroke-width=".8" opacity=".6"/>
    <ellipse rx="16" ry="6" fill="none" stroke="#5ce4ff" stroke-width=".8" opacity=".6"/>
    <text x="0" y="62" font-family="ui-monospace, JetBrains Mono, monospace" font-size="13" fill="#5a564e" text-anchor="middle">public URL</text>
  </g>

  <!-- brand badge top-right -->
  <g transform="translate(1010, 60)">
    <svg x="0" y="0" width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="2.5" y="6" width="19" height="12" rx="2" stroke="#e8e4da" stroke-width="1.5"/>
      <rect x="5.5" y="9" width="13" height="6" rx="1" fill="#0a0a0c" stroke="#b8ff5c" stroke-width="1"/>
      <rect x="7" y="10.5" width="1" height="3" fill="#d9b26a"/>
      <rect x="9" y="10.5" width="1" height="3" fill="#d9b26a"/>
      <rect x="11" y="10.5" width="1" height="3" fill="#d9b26a"/>
      <rect x="13" y="10.5" width="1" height="3" fill="#d9b26a"/>
      <rect x="15" y="10.5" width="1" height="3" fill="#d9b26a"/>
      <circle cx="19.2" cy="7.6" r=".9" fill="#b8ff5c"/>
    </svg>
    <text x="44" y="24" font-family="Inter Tight, system-ui, sans-serif" font-weight="700" font-size="22" fill="#e8e4da">Manfath</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="130" font-family="ui-monospace, JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#b8ff5c" letter-spacing="3">v1.0 · FREE FOREVER</text>

  <!-- title -->
  <text x="80" y="220" font-family="Inter Tight, system-ui, sans-serif" font-weight="800" font-size="78" fill="#e8e4da" letter-spacing="-2">See every port.</text>
  <text x="80" y="300" font-family="Inter Tight, system-ui, sans-serif" font-weight="800" font-size="78" fill="#e8e4da" letter-spacing="-2">Kill what you don't need.</text>
  <text x="80" y="380" font-family="Inter Tight, system-ui, sans-serif" font-weight="800" font-size="78" fill="#d9b26a" letter-spacing="-2">Share the rest.</text>

  <!-- URL pill -->
  <g transform="translate(80, 555)">
    <rect width="170" height="40" rx="20" fill="rgba(232,228,218,.06)" stroke="rgba(232,228,218,.18)"/>
    <text x="85" y="26" font-family="ui-monospace, JetBrains Mono, monospace" font-size="15" fill="#e8e4da" text-anchor="middle">manfath.dev</text>
  </g>

  <!-- macOS hint pill -->
  <g transform="translate(270, 555)">
    <rect width="200" height="40" rx="20" fill="rgba(184,255,92,.08)" stroke="rgba(184,255,92,.3)"/>
    <text x="100" y="26" font-family="Inter Tight, system-ui, sans-serif" font-weight="600" font-size="15" fill="#b8ff5c" text-anchor="middle">macOS · MIT license</text>
  </g>
</svg>
