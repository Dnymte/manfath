name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can — it makes the difference between "fixed in 5 minutes" and "I have no idea what they're seeing".

  - type: input
    id: version
    attributes:
      label: Manfath version
      description: From Settings → About, e.g. `1.0.0 (1)`.
      placeholder: 1.0.0 (1)
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      description: From  → About This Mac, e.g. `15.2`.
      placeholder: "14.6"
    validations:
      required: true

  - type: input
    id: arch
    attributes:
      label: CPU architecture
      placeholder: Apple Silicon (M1/M2/M3) or Intel
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the popover
        2. Click `tunnel` on port 3000
        3. ...
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Anything else
      description: Screenshots, console output, the contents of `~/Library/Preferences/com.manfath.app.plist`, anything that helps.
