name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'web/**'
      - 'docs/**'
      - '**.md'

jobs:
  test:
    name: swift test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Using $XC"
          sudo xcode-select -s "$XC"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test --enable-test-discovery

  build:
    name: xcodebuild
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Using $XC"
          sudo xcode-select -s "$XC"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug, ad-hoc signing)
        run: |
          xcodebuild \
            -project Manfath.xcodeproj \
            -scheme Manfath \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
