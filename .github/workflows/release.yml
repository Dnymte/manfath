name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build, sign, notarize, publish
    runs-on: macos-15

    permissions:
      contents: write   # needed to create / edit releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Using $XC"
          sudo xcode-select -s "$XC"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/manfath-build.keychain-db
          printf '%s' "$DEVELOPER_ID_CERT_P12" | tr -d '[:space:]' | base64 --decode > $RUNNER_TEMP/cert.p12
          file $RUNNER_TEMP/cert.p12
          ls -l $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 \
              -P "$DEVELOPER_ID_CERT_PASSWORD" \
              -A -t agg -f pkcs12 \
              -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain
          # Verify both cert and private key landed in the keychain, and
          # capture the SHA1 hash so codesign can pick the identity by
          # fingerprint regardless of how the secret was spelled.
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          SHA=$(security find-identity -v -p codesigning $KEYCHAIN_PATH \
                | awk -F'"' '/Developer ID Application/ {print $1; exit}' \
                | awk '{print $2}')
          if [ -z "$SHA" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            exit 1
          fi
          echo "RESOLVED_CODE_SIGN_IDENTITY=$SHA" >> $GITHUB_ENV
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          rm $RUNNER_TEMP/cert.p12

      - name: Store notary credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials manfath-notary \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Run release script
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          # Use the SHA1 of the imported identity. This avoids name
          # mismatches between the human-readable identity string and
          # what's actually in the keychain.
          CODE_SIGN_IDENTITY: ${{ env.RESOLVED_CODE_SIGN_IDENTITY }}
          NOTARY_PROFILE: manfath-notary
        run: ./Scripts/release.sh

      - name: Compute SHA-256 of DMG
        id: sha
        run: |
          DMG=$(ls build/Manfath-*.dmg | head -1)
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "dmg=$DMG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sha.outputs.dmg }}
          generate_release_notes: true
          body: |
            ## Manfath ${{ steps.sha.outputs.version }}

            Install via Homebrew:
            ```sh
            brew install --cask Dnymte/tap/manfath
            ```

            Or download `Manfath-${{ steps.sha.outputs.version }}.dmg`
            below.

            **SHA-256:** `${{ steps.sha.outputs.sha }}`

      - name: Bump tap cask
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          VERSION: ${{ steps.sha.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        if: env.TAP_PUSH_TOKEN != ''
        run: |
          # Updates the cask formula in the tap repo and pushes. Skipped
          # silently if TAP_PUSH_TOKEN isn't configured (e.g. tap doesn't
          # exist yet).
          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/Dnymte/homebrew-tap.git" tap
          cd tap
          mkdir -p Casks
          sed -i '' \
              -e "s/version \"[^\"]*\"/version \"$VERSION\"/" \
              -e "s/sha256 \"[^\"]*\"/sha256 \"$SHA\"/" \
              ../Casks/manfath.rb
          cp ../Casks/manfath.rb Casks/manfath.rb
          git config user.name "manfath-release"
          git config user.email "release@manfath.dev"
          git add Casks/manfath.rb
          git commit -m "manfath ${VERSION}"
          git push
